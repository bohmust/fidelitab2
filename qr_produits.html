<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FidéliTab — QR codes produits</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0D0D14;
    --gold: #C9922A;
    --jade: #1A7A5E;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text2: #6b7280;
    --border: #E5E1D8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 32px 60px;
  }
  .page-header {
    max-width: 900px;
    margin: 0 auto 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--ink);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 900;
    color: var(--gold);
  }
  .logo-name {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 700;
    color: var(--ink);
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 900;
    color: var(--ink);
    line-height: 1.2;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text2);
    margin-top: 6px;
    line-height: 1.6;
    max-width: 520px;
  }
  .print-btn {
    padding: 13px 24px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-end;
    transition: opacity .15s;
  }
  .print-btn:hover { opacity: .85; }
  .loading-state {
    max-width: 900px;
    margin: 60px auto;
    text-align: center;
    color: var(--text2);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state {
    max-width: 900px;
    margin: 60px auto;
    background: #fff3f0;
    border: 1px solid #fecaca;
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    font-size: 14px;
    color: #b91c1c;
    line-height: 1.7;
  }
  .grid {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 18px 18px 0 0;
  }
  .card-emoji { font-size: 36px; margin-bottom: 10px; display: block; }
  .card-name {
    font-family: 'Fraunces', serif;
    font-size: 16px; font-weight: 700;
    color: var(--ink); margin-bottom: 4px;
  }
  .card-sub {
    font-size: 12px; color: var(--text2);
    margin-bottom: 16px; line-height: 1.5;
  }
  .qr-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .card-url { font-size: 10px; color: #aaa; word-break: break-all; line-height: 1.4; }

  @media print {
    body { background: #fff; padding: 16px; }
    .page-header, .print-btn { display: none; }
    .grid { max-width: 100%; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .card { break-inside: avoid; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="logo-row">
      <div class="logo-icon">F</div>
      <span class="logo-name">FidéliTab</span>
    </div>
    <h1>QR codes à imprimer</h1>
    <p class="subtitle">Chaque QR code correspond à un produit. Le client le scanne avec son téléphone — sa carte s'ouvre directement sur le bon produit.</p>
  </div>
  <button class="print-btn" onclick="window.print()">🖨️ Imprimer</button>
</div>

<div id="content">
  <div class="loading-state">
    <div class="spinner"></div>
    Chargement des produits…
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ============================================================
const SUPABASE_URL = 'https://cgyvmrxpoofrnturffxl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNneXZtcnhwb29mcm50dXJmZnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjkxNjQsImV4cCI6MjA4Nzk0NTE2NH0.0JNkokFJOshJnzyrBOSbgrnyFHeLvA5pMaaL1jP8kq8';
const BASE_URL     = 'https://bohmust.github.io/fidelitab2';
// ============================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ACCENTS = ['#C9922A','#1A7A5E','#3C3489','#D85A30','#185FA5','#059669','#9333ea','#dc2626'];

async function init() {
  const content = document.getElementById('content');
  try {
    const { data: rules, error } = await sb
      .from('regles_tampons')
      .select('*')
      .eq('actif', true)
      .order('ordre');

    if (error) throw error;
    if (!rules || rules.length === 0) {
      content.innerHTML = `<div class="error-state">Aucun produit actif trouvé.<br>Ajoutez des produits depuis l'admin → ⚙ Produits.</div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'grid';

    rules.forEach((r, idx) => {
      // Générer un slug depuis le nom (ex: "E-cig" → "e-cig", "Café" → "cafe")
      const slug = r.nom.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');

      const url = `${BASE_URL}/?p=${slug}`;
      const accent = ACCENTS[idx % ACCENTS.length];
      const cardId = 'qr_' + r.id;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-accent" style="background:${accent}"></div>
        <span class="card-emoji">${r.emoji || '🛒'}</span>
        <div class="card-name">${r.nom}</div>
        <div class="card-sub">${r.objectif} achats → ${r.recompense}</div>
        <div class="qr-wrap" id="${cardId}"></div>
        <div class="card-url">${url}</div>`;
      grid.appendChild(card);

      setTimeout(() => {
        const wrap = document.getElementById(cardId);
        if (wrap && window.QRCode) {
          new QRCode(wrap, {
            text: url, width: 140, height: 140,
            colorDark: '#0D0D14', colorLight: '#ffffff'
          });
        }
      }, 150);
    });

    content.innerHTML = '';
    content.appendChild(grid);

  } catch(e) {
    content.innerHTML = `<div class="error-state">
      Erreur : ${e.message || 'Vérifiez votre connexion.'}<br><br>
      <button onclick="location.reload()" style="padding:8px 16px;border-radius:8px;border:none;background:#0D0D14;color:#fff;cursor:pointer;font-family:inherit">Réessayer</button>
    </div>`;
  }
}

init();
</script>
</body>
</html>
