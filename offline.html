<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FidéliTab — Hors ligne</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#3C3489;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .icon{font-size:64px;margin-bottom:24px}
  .title{font-size:22px;font-weight:700;margin-bottom:10px}
  .sub{font-size:15px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:32px}
  .box{background:rgba(255,255,255,.1);border-radius:14px;padding:18px 20px;margin-bottom:24px;font-size:14px;line-height:1.7;color:rgba(255,255,255,.85)}
  .btn{padding:14px 28px;border-radius:12px;border:none;background:#fff;color:#3C3489;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="title">Pas de connexion</div>
  <div class="sub">FidéliTab a besoin d'internet pour fonctionner.</div>
  <div class="box">
    Reconnectez-vous au Wi-Fi ou activez vos données mobiles, puis réessayez.<br><br>
    Votre carte et vos tampons sont sauvegardés — rien n'est perdu.
  </div>
  <button class="btn" onclick="location.reload()">↺ Réessayer</button>
</body>
</html>
