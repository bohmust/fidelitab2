<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin FidéliTab</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #0D0D14;
  color: white;
  padding: 20px;
}

h1 {
  font-family: 'Fraunces', serif;
  color: #C9922A;
}

.section {
  margin-top: 30px;
  background: #16161f;
  padding: 20px;
  border-radius: 16px;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

button {
  background: #1A7A5E;
  color: white;
  cursor: pointer;
}

.produit {
  padding: 10px;
  border-bottom: 1px solid #2a2a3a;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #C9922A;
  color: black;
  padding: 12px 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<h1>⚙ Admin FidéliTab</h1>

<div class="section">
  <h2>➕ Ajouter un produit</h2>
  <input id="nom_produit" placeholder="Nom produit">
  <br>
  <input id="nb_tampons" type="number" placeholder="Nb tampons">
  <br>
  <button onclick="ajouterProduit()">Ajouter</button>
</div>

<div class="section">
  <h2>📦 Produits</h2>
  <button onclick="chargerProduits()">🔄 Rafraîchir</button>
  <div id="liste_produits"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = "https://cgyvmrxpoofrnturffxl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNneXZtcnhwb29mcm50dXJmZnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjkxNjQsImV4cCI6MjA4Nzk0NTE2NH0.0JNkokFJOshJnzyrBOSbgrnyFHeLvA5pMaaL1jP8kq8";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

// 🔥 SCAN AUTO
async function handleScan() {
  const params = new URLSearchParams(window.location.search);
  const membre_id = params.get("scan");
  const rule_id = params.get("rule");

  if (!membre_id || !rule_id) return;

  // Vérifie si carte existe
  let { data: carte } = await supabase
    .from("cartes_tampons")
    .select("*")
    .eq("membre_id", membre_id)
    .eq("regle_id", rule_id)
    .single();

  if (!carte) {
    // créer carte
    const { data } = await supabase
      .from("cartes_tampons")
      .insert([{
        membre_id: membre_id,
        regle_id: rule_id,
        nb_tampons: 0
      }])
      .select()
      .single();

    carte = data;
  }

  // ajoute tampon
  const newCount = (carte.nb_tampons || 0) + 1;

  await supabase
    .from("cartes_tampons")
    .update({ nb_tampons: newCount })
    .eq("id", carte.id);

  showToast("✅ Tampon ajouté");

  // évite double scan
  window.history.replaceState({}, document.title, "/fidelitab2/admin.html");
}

// ➕ produit
async function ajouterProduit() {
  const nom = document.getElementById("nom_produit").value;
  const nb = document.getElementById("nb_tampons").value;

  await supabase.from("regles_tampons").insert([{
    nom,
    nb_tampons: nb,
    actif: true
  }]);

  showToast("Produit ajouté");
  chargerProduits();
}

// 📦 liste produits
async function chargerProduits() {
  const { data } = await supabase
    .from("regles_tampons")
    .select("*")
    .order("id");

  const container = document.getElementById("liste_produits");
  container.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "produit";
    div.innerHTML = `<strong>${p.nom}</strong> — ${p.nb_tampons} tampons`;
    container.appendChild(div);
  });
}

// init
handleScan();
chargerProduits();
</script>

</body>
</html>
