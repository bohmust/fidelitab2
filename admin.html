<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FidéliTab — Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #3C3489; --purple-l: #EEEDFE;
  --green: #1D9E75; --green-l: #E1F5EE;
  --red: #D85A30; --red-l: #FAECE7;
  --text: #111827; --text2: #6b7280;
  --border: #e5e7eb; --bg: #f9fafb; --white: #fff;
}
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
.topbar { background: var(--purple); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.logo { width: 32px; height: 32px; background: rgba(255,255,255,.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 14px; }
.topbar-title { font-size: 14px; font-weight: 600; color: #fff; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,.6); }
nav { display: flex; gap: 4px; flex-wrap: wrap; }
.nav-btn { padding: 7px 12px; border-radius: 8px; border: none; background: transparent; color: rgba(255,255,255,.7); font-size: 13px; cursor: pointer; font-family: inherit; }
.nav-btn.active, .nav-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
.scan-fab { position: fixed; bottom: 24px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--green); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 20px rgba(29,158,117,.4); z-index: 100; }
.main { max-width: 960px; margin: 0 auto; padding: 20px; padding-bottom: 90px; }
.panel { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.panel-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: 700; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.member-row { display: grid; grid-template-columns: 1fr 110px 90px 70px 90px; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; border-radius: 8px; }
.member-row:hover { background: var(--bg); }
.member-header { display: grid; grid-template-columns: 1fr 110px 90px 70px 90px; gap: 8px; padding: 10px 14px; background: var(--bg); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.tier { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
.tier-bronze  { background: #FAEEDA; color: #633806; }
.tier-argent  { background: #F1EFE8; color: #5F5E5A; }
.tier-or      { background: #FAC775; color: #412402; }
.tier-platine { background: #EEEDFE; color: #3C3489; }
.txn-row { display: flex; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.txn-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.stamp-card { border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.stamp-card.full { background: var(--purple-l); border-color: #c4c0f0; }
.sdots { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.sdot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
.sdot.on  { background: var(--green-l); border: 2px solid var(--green); color: var(--green); }
.sdot.off { background: #f3f4f6; border: 1.5px dashed #d1d5db; }
.inp { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--white); }
.inp:focus { outline: none; border-color: var(--purple); }
.btn-green  { padding: 9px 18px; border-radius: 10px; border: none; background: var(--green); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-red    { padding: 6px 12px; border-radius: 8px; border: none; background: var(--red-l); color: var(--red); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-purple { padding: 9px 18px; border-radius: 10px; border: none; background: var(--purple); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-ghost  { padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; }
.btn-sm-ghost { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; font-family: inherit; }
.scanner-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: none; flex-direction: column; }
.scanner-header { background: var(--purple); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.scanner-title { font-size: 16px; font-weight: 600; color: #fff; }
.scanner-close { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; }
.scanner-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; }
.scan-viewport { position: relative; width: 100%; max-width: 360px; background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 1; }
.scan-video { width: 100%; height: 100%; object-fit: cover; display: block; }
.scan-canvas { display: none; }
.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.scan-ring { width: 220px; height: 220px; position: relative; }
.sc { position: absolute; width: 24px; height: 24px; border-color: #4ade80; border-style: solid; }
.sc.tl { top:-2px;left:-2px; border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
.sc.tr { top:-2px;right:-2px; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
.sc.bl { bottom:-2px;left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
.sc.br { bottom:-2px;right:-2px; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }
.scan-line { position: absolute; left: 12px; right: 12px; height: 2px; background: linear-gradient(to right,transparent,#4ade80,transparent); animation: scanLine 1.8s linear infinite; }
@keyframes scanLine { 0%{top:12px} 100%{top:calc(100% - 12px)} }
.scan-hint { color: rgba(255,255,255,.8); font-size: 14px; font-weight: 500; text-align: center; }
.confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; display: none; align-items: flex-end; }
.confirm-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; padding: 24px 20px 32px; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.emoji-btn { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-size: 18px; cursor: pointer; }
.emoji-btn.sel { border-color: var(--purple); background: var(--purple-l); }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.flabel { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; }
.toast-el { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; z-index: 400; white-space: nowrap; }
@media(max-width:600px) {
  .kpi-grid{grid-template-columns:1fr 1fr}
  .member-row,.member-header{grid-template-columns:1fr 80px 80px}
  .grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo">F</div>
    <div><div class="topbar-title">FidéliTab Admin</div><div class="topbar-sub">Tabac Presse Grandclément</div></div>
  </div>
  <nav id="mainNav">
    <button class="nav-btn active" data-tab="dashboard">Accueil</button>
    <button class="nav-btn" data-tab="members">Membres</button>
    <button class="nav-btn" data-tab="history">Historique</button>
    <button class="nav-btn" data-tab="settings">⚙ Produits</button>
  </nav>
</div>

<button class="scan-fab" id="scanFab" title="Scanner un client">📷</button>
<div class="main" id="mainContent"></div>

<!-- SCANNER -->
<div class="scanner-modal" id="scannerModal">
  <div class="scanner-header">
    <div class="scanner-title">📷 Scanner le QR du client</div>
    <button class="scanner-close" id="scanClose">✕ Fermer</button>
  </div>
  <div class="scanner-body">
    <div class="scan-viewport">
      <video class="scan-video" id="scanVideo" playsinline muted autoplay></video>
      <canvas class="scan-canvas" id="scanCanvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-ring">
          <div class="sc tl"></div><div class="sc tr"></div>
          <div class="sc bl"></div><div class="sc br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div class="scan-hint" id="scanHint">Pointez vers le QR code du client</div>
  </div>
</div>

<!-- CONFIRM STAMP -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-sheet" id="confirmSheet"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
const SUPABASE_URL = 'https://cgyvmrxpoofrnturffxl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNneXZtcnhwb29mcm50dXJmZnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjkxNjQsImV4cCI6MjA4Nzk0NTE2NH0.0JNkokFJOshJnzyrBOSbgrnyFHeLvA5pMaaL1jP8kq8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──
let members = [], rules = [], txns = [];
let activeTab = 'dashboard';
let selMemberId = null;
let scanStream = null, scanRaf = null, scanActive = false;
let selEmoji = '🛒';

// ── HELPERS ──
const TIERS = [[0,'bronze'],[500,'argent'],[1500,'or'],[3000,'platine']];
function getTier(p) { for(let i=TIERS.length-1;i>=0;i--) if(p>=TIERS[i][0]) return TIERS[i][1]; return 'bronze'; }
function tierLabel(t) { return {bronze:'Bronze',argent:'Argent',or:'Or',platine:'Platine'}[t]||''; }
function ptColor(t) { return ['echange','recompense'].includes(t)?'var(--red)':'var(--green)'; }
const avBg = ['#E1F5EE','#E6F1FB','#FAEEDA','#EEEDFE','#FAECE7'];
const avFg = ['#0F6E56','#185FA5','#633806','#3C3489','#993C1D'];
function avS(n) { const i=n.charCodeAt(0)%5; return 'background:'+avBg[i]+';color:'+avFg[i]; }
function avI(n) { return n.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase(); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast-el';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── DATA ──
async function loadData() {
  const [m, r, t] = await Promise.all([
    sb.from('membres').select('*').order('cree_le', {ascending:false}),
    sb.from('regles_tampons').select('*').eq('actif',true).order('ordre'),
    sb.from('transactions').select('*').order('cree_le', {ascending:false}).limit(60)
  ]);
  members = m.data || [];
  rules   = r.data || [];
  txns    = t.data || [];
}

// ── RENDER ──
async function render() {
  if (selMemberId) { await renderMemberDetail(selMemberId); return; }
  const el = document.getElementById('mainContent');
  if (activeTab === 'dashboard') { await loadData(); el.innerHTML = buildDashboard(); }
  else if (activeTab === 'members')  { await loadData(); el.innerHTML = buildMembers(); }
  else if (activeTab === 'history')  { el.innerHTML = buildHistory(); }
  else if (activeTab === 'settings') { el.innerHTML = buildSettings(); renderRulesList(); }
  else if (activeTab === 'newmember') { el.innerHTML = buildNewMember(); }
}

// ── NAV ──
document.getElementById('mainNav').addEventListener('click', function(e) {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  activeTab = tab;
  selMemberId = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

// ── MEMBER CLICK (event delegation) ──
document.getElementById('mainContent').addEventListener('click', function(e) {
  const row = e.target.closest('[data-member-id]');
  if (row) {
    const id = row.getAttribute('data-member-id');
    selMemberId = id;
    renderMemberDetail(id);
  }
});

// ── DASHBOARD ──
function buildDashboard() {
  const totPts = members.reduce((a,m) => a+(m.points||0), 0);
  const tc = {bronze:0,argent:0,or:0,platine:0};
  members.forEach(m => { const t=getTier(m.points||0); tc[t]=(tc[t]||0)+1; });
  const top3 = [...members].sort((a,b) => (b.points||0)-(a.points||0)).slice(0,3);
  const recent = txns.slice(0,8);

  let topHtml = top3.map((m,i) => `
    <div data-member-id="${m.id}" style="display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer">
      <div style="font-size:16px;font-weight:600;color:var(--text2);width:20px;text-align:center">${i+1}</div>
      <div class="avatar" style="${avS(m.nom)}">${avI(m.nom)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:3px">${m.nom}</div>
        <span class="tier tier-${getTier(m.points||0)}">${tierLabel(getTier(m.points||0))}</span>
      </div>
      <div style="font-size:14px;font-weight:700">${(m.points||0).toLocaleString('fr-FR')} <span style="font-size:11px;color:var(--text2)">pts</span></div>
    </div>`).join('');

  let recentHtml = recent.map(t => {
    const m = members.find(x => x.id===t.membre_id);
    return `<div class="txn-row">
      <div class="txn-dot" style="background:${t.type==='echange'||t.type==='recompense'?'var(--red-l)':t.type==='bonus'?'var(--purple-l)':'var(--green-l)'};color:${ptColor(t.type)}">${t.type==='echange'||t.type==='recompense'?'−':t.type==='bonus'?'★':'+'}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${m?.nom||'—'}</div><div style="font-size:12px;color:var(--text2)">${t.description||''}</div></div>
      <div style="font-size:13px;font-weight:600;color:${ptColor(t.type)};flex-shrink:0">${t.points>0?'+':''}${t.points}</div>
    </div>`;
  }).join('');

  return `
    <div style="background:#1e1b4b;border-radius:16px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div><div style="font-size:14px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:4px">Prêt à scanner</div>
      <div style="font-size:13px;color:rgba(255,255,255,.55)">Appuyez sur 📷 pour scanner le QR d'un client</div></div>
      <button class="btn-green" onclick="openScanner()">📷 Scanner</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Membres</div><div class="kpi-value">${members.length}</div></div>
      <div class="kpi"><div class="kpi-label">Points émis</div><div class="kpi-value">${totPts.toLocaleString('fr-FR')}</div></div>
      <div class="kpi"><div class="kpi-label">Transactions</div><div class="kpi-value">${txns.length}</div></div>
      <div class="kpi"><div class="kpi-label">Platine</div><div class="kpi-value">${tc.platine}</div></div>
    </div>
    <div class="grid2">
      <div class="panel"><div class="panel-title">Activité récente</div>${recentHtml}</div>
      <div class="panel"><div class="panel-title">Top membres</div>${topHtml}</div>
    </div>`;
}

// ── MEMBERS ──
function buildMembers() {
  let rows = members.map(m => `
    <div class="member-row" data-member-id="${m.id}">
      <div style="display:flex;gap:10px;align-items:center;min-width:0">
        <div class="avatar" style="${avS(m.nom)}">${avI(m.nom)}</div>
        <div style="min-width:0">
          <div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${m.nom}</div>
          <div style="font-size:12px;color:var(--text2)">${m.email||'—'}</div>
        </div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--text2)">${m.telephone}</div>
      <div style="text-align:right"><span class="tier tier-${getTier(m.points||0)}">${tierLabel(getTier(m.points||0))}</span></div>
      <div style="text-align:right;font-size:13px;color:var(--text2)">${m.visites||0}</div>
      <div style="text-align:right;font-size:14px;font-weight:700">${(m.points||0).toLocaleString('fr-FR')}</div>
    </div>`).join('');

  return `<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="panel-title" style="margin:0">Membres (${members.length})</div>
      <div style="display:flex;gap:8px">
        <button class="btn-purple" onclick="goNewMember()">+ Nouveau client</button>
        <button class="btn-sm-ghost" onclick="loadData().then(render)">↻</button>
      </div>
    </div>
    <div class="member-header">
      <span>Membre</span><span style="text-align:right">Téléphone</span><span style="text-align:right">Niveau</span><span style="text-align:right">Visites</span><span style="text-align:right">Points</span>
    </div>
    ${rows}
  </div>`;
}

// ── MEMBER DETAIL ──
async function renderMemberDetail(id) {
  const el = document.getElementById('mainContent');
  const m = members.find(x => x.id === id);
  if (!m) return;

  const { data: cards } = await sb.from('cartes_tampons').select('*').eq('membre_id', id);
  const cm = {};
  (cards||[]).forEach(c => { cm[c.regle_id] = c.compteur; });
  const mt = txns.filter(t => t.membre_id === id);

  const stampCards = rules.map(r => {
    const count = cm[r.id]||0;
    const full = count >= r.objectif;
    const dots = Array.from({length:r.objectif}, (_,i) =>
      `<div class="sdot ${i<count?'on':'off'}">${i<count?'✓':''}</div>`
    ).join('');
    const addBtn = `<button class="btn-green" style="width:100%;margin-top:6px" onclick="addStampManual('${id}',${r.id})">✚ Tampon ${r.emoji} ${r.nom}</button>`;
    const removeBtn = `<button class="btn-red" style="margin-top:6px" onclick="removeStampManual('${id}',${r.id})">− Retirer</button>`;
    const claimDiv = `<div style="background:var(--purple-l);border-radius:10px;padding:12px;margin-top:6px"><div style="font-size:13px;font-weight:600;color:#3C3489;margin-bottom:8px">🎉 Carte complète — ${r.recompense}</div><button class="btn-green" style="width:100%" onclick="claimReward('${id}',${r.id})">✓ Offrir la récompense et remettre à zéro</button></div>`;

    return `<div class="stamp-card ${full?'full':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:20px">${r.emoji}</span>
          <div><div style="font-size:14px;font-weight:600${full?';color:#3C3489':''}">${r.nom}</div><div style="font-size:12px;color:var(--text2)">${r.recompense}</div></div>
        </div>
        <span style="font-size:13px;font-weight:600${full?';color:#3C3489':''}">${count}/${r.objectif}</span>
      </div>
      <div class="sdots">${dots}</div>
      ${full ? claimDiv : `<div style="display:flex;gap:8px">${addBtn}${count>0?removeBtn:''}</div>`}
    </div>`;
  }).join('');

  const history = mt.slice(0,12).map(t => `
    <div class="txn-row">
      <div class="txn-dot" style="background:${t.type==='echange'||t.type==='recompense'?'var(--red-l)':t.type==='bonus'?'var(--purple-l)':'var(--green-l)'};color:${ptColor(t.type)}">${t.type==='echange'||t.type==='recompense'?'−':t.type==='bonus'?'★':'+'}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500">${t.description||''}</div><div style="font-size:12px;color:var(--text2)">${new Date(t.cree_le).toLocaleDateString('fr-FR')}</div></div>
      <div style="font-size:13px;font-weight:600;color:${ptColor(t.type)}">${t.points>0?'+':''}${t.points}</div>

  el.innerHTML = `
    <div style="margin-bottom:16px;font-size:13px">

          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px">

            <span class="tier tier-${getTier(m.points||0)}">${tierLabel(getTier(m.points||0))}</span>

function backToMembers() {
  selMemberId = null;
  activeTab = 'members';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="members"]').classList.add('active');
  render();
}

// ── STAMP ACTIONS ──
async function addStampManual(memberId, ruleId) {
  const rule = rules.find(r => r.id === ruleId);
  if (!rule) return;
  const { data: cards } = await sb.from('cartes_tampons').select('*').eq('membre_id', memberId);
  const cm = {};
  (cards||[]).forEach(c => { cm[c.regle_id] = c.compteur; });
  const newCount = (cm[ruleId]||0) + 1;
  await sb.from('cartes_tampons').upsert({membre_id:memberId,regle_id:ruleId,compteur:newCount,mis_a_jour_le:new Date().toISOString()},{onConflict:'membre_id,regle_id'});
  const member = members.find(m => m.id === memberId);
  await sb.from('membres').update({points:(member?.points||0)+rule.points_par_tampon,visites:(member?.visites||0)+1}).eq('id',memberId);
  await sb.from('transactions').insert([{membre_id:memberId,type:'tampon',points:rule.points_par_tampon,description:'Tampon '+rule.nom,regle_id:ruleId}]);
  showToast('✓ Tampon '+rule.emoji+' '+rule.nom+' ajouté' + (newCount>=rule.objectif?' 🎉 Carte complète !':''));
  await loadData();
  await renderMemberDetail(memberId);
}


async function claimReward(memberId, ruleId) {
  const rule = rules.find(r => r.id === ruleId);
  if (!rule) return;
  showConfirmDialog(
    '🎁 Offrir la récompense',
    rule.recompense,
    'Confirmer et remettre à zéro',
    async () => {
      await sb.from('cartes_tampons').upsert({
        membre_id:memberId, regle_id:ruleId, compteur:0,
        mis_a_jour_le:new Date().toISOString()
      },{onConflict:'membre_id,regle_id'});
      await sb.from('transactions').insert([{
        membre_id:memberId, type:'recompense', points:0,
        description:'Récompense offerte : '+rule.recompense, regle_id:ruleId
      }]);
      showToast('✓ Récompense offerte — carte remise à zéro !');
      await loadData();
      await renderMemberDetail(memberId);
    }
  );
}

function showConfirmDialog(title, subtitle, btnLabel, onConfirm) {
  // Remove existing dialog
  const existing = document.getElementById('confirmDialog');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'confirmDialog';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease';

  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;padding:28px 24px;max-width:380px;width:100%;text-align:center';

  box.innerHTML = `
    <div style="font-size:48px;margin-bottom:16px">🎁</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;color:#111">${title.replace('🎁 ','')}</div>
    <div style="font-size:15px;color:#3C3489;font-weight:600;background:#EEEDFE;border-radius:10px;padding:12px;margin-bottom:20px">${subtitle}</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:20px">Cette action offrira la récompense au client et remettra sa carte à zéro.</div>
    <div style="display:flex;gap:10px">
      <button id="cancelDialog" style="flex:1;padding:14px;border-radius:12px;border:1px solid #e5e7eb;background:transparent;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#6b7280">Annuler</button>
      <button id="confirmDialogBtn" style="flex:1;padding:14px;border-radius:12px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">${btnLabel}</button>
    </div>`;

  overlay.appendChild(box);
  document.body.appendChild(overlay);

  document.getElementById('cancelDialog').onclick = () => overlay.remove();
  document.getElementById('confirmDialogBtn').onclick = async () => {
    overlay.remove();
    await onConfirm();
  };
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
}

async function removeStampManual(memberId, ruleId) {
  const rule = rules.find(r => r.id === ruleId);
  if (!rule) return;
  const { data: cards } = await sb.from('cartes_tampons').select('*').eq('membre_id', memberId);
  const cm = {};
  (cards||[]).forEach(c => { cm[c.regle_id] = c.compteur; });
  const current = cm[ruleId]||0;
  if (current <= 0) { showToast('Aucun tampon à retirer'); return; }
  await sb.from('cartes_tampons').upsert({membre_id:memberId,regle_id:ruleId,compteur:current-1,mis_a_jour_le:new Date().toISOString()},{onConflict:'membre_id,regle_id'});
  const member = members.find(m => m.id === memberId);
  if (member && member.points >= rule.points_par_tampon) {
    await sb.from('membres').update({points:(member.points||0)-rule.points_par_tampon}).eq('id',memberId);
  }
  await sb.from('transactions').insert([{membre_id:memberId,type:'echange',points:-rule.points_par_tampon,description:'Correction tampon '+rule.nom,regle_id:ruleId}]);
  showToast('✓ Tampon retiré');
  await loadData();
  await renderMemberDetail(memberId);
}

// ── SETTINGS ──
const EMOJIS = ['🚬','☕','📰','💨','🍺','🥤','🎰','🍫','🧴','🔋','📦','🛒','⭐','🎁','💊','🍕','🥐','🧃','🍭','🎮'];

function buildSettings() {
  return `<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div class="panel-title" style="margin:0">Produits & règles tampons</div>
      <button class="btn-purple" onclick="document.getElementById('addRulePanel').style.display='block'">+ Ajouter un produit</button>
    </div>
    <div id="rulesList"></div>
  </div>
  <div class="panel" id="addRulePanel" style="display:none">
    <div class="panel-title">Nouveau produit</div>
    <div style="margin-bottom:10px"><span class="flabel">Emoji</span><div class="emoji-picker" id="emojiPicker"></div></div>
    <div class="form-grid2">
      <div><span class="flabel">Nom *</span><input class="inp" id="rNom" placeholder="ex: FDJ, Boisson..."></div>
      <div><span class="flabel">Récompense *</span><input class="inp" id="rRecompense" placeholder="ex: 1 ticket FDJ offert"></div>
    </div>
    <div class="form-grid2">
      <div><span class="flabel">Nb achats avant récompense</span><input class="inp" type="number" id="rObjectif" value="10" min="2" max="50"></div>
      <div><span class="flabel">Points par tampon</span><input class="inp" type="number" id="rPts" value="5" min="1"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn-green" onclick="doAddRule()">Enregistrer</button>
      <button class="btn-ghost" onclick="document.getElementById('addRulePanel').style.display='none'">Annuler</button>

}

function renderRulesList() {
  const picker = document.getElementById('emojiPicker');
  if (picker) {
    picker.innerHTML = '';
    EMOJIS.forEach(em => {
      const b = document.createElement('button');
      b.className = 'emoji-btn' + (em===selEmoji?' sel':'');
      b.textContent = em;
      b.onclick = () => { selEmoji=em; renderRulesList(); };
      picker.appendChild(b);
    });
  }
  const list = document.getElementById('rulesList');
  if (!list) return;
  list.innerHTML = rules.map(r => `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)">
      <span style="font-size:22px">${r.emoji}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600">${r.nom}</div>
        <div style="font-size:12px;color:var(--text2)">${r.objectif} achats → ${r.recompense} · +${r.points_par_tampon} pts</div>
      </div>
      <button class="btn-red" onclick="deleteRule(${r.id})">Supprimer</button>
    </div>`).join('');
}

async function doAddRule() {
  const nom = document.getElementById('rNom').value.trim();
  const recompense = document.getElementById('rRecompense').value.trim();
  const objectif = parseInt(document.getElementById('rObjectif').value)||10;
  const pts = parseInt(document.getElementById('rPts').value)||5;
  if (!nom||!recompense) { alert('Nom et récompense obligatoires'); return; }
  const maxOrdre = rules.reduce((a,r) => Math.max(a,r.ordre||0), 0);
  const {error} = await sb.from('regles_tampons').insert([{nom,emoji:selEmoji,objectif,recompense,points_par_tampon:pts,actif:true,ordre:maxOrdre+1}]);
  if (error) { showToast('❌ Erreur : '+error.message); return; }
  showToast('✓ Produit "'+nom+'" ajouté');
  await loadData();
  activeTab = 'settings';
  selMemberId = null;
  await render();
}

async function deleteRule(id) {
  if (!confirm('Supprimer ce produit ?')) return;
  await sb.from('regles_tampons').update({actif:false}).eq('id',id);
  showToast('Produit supprimé');
  await loadData();
  activeTab = 'settings';
  selMemberId = null;
  await render();
}

// ── NEW MEMBER ──
function goNewMember() {
  activeTab = 'newmember';
  render();
}

function buildNewMember() {
  return `<div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="panel-title" style="margin:0">Inscrire un nouveau client</div>

    <div class="form-grid2">

async function doCreateMember() {
  const prenom = document.getElementById('mPrenom').value.trim();
  const nom    = document.getElementById('mNom').value.trim();
  const tel    = document.getElementById('mTel').value.replace(/\s/g,'');
  const email  = document.getElementById('mEmail').value.trim();
  const dob    = document.getElementById('mDob').value;
  const errEl  = document.getElementById('mErr');
  if (!prenom||!nom) { errEl.textContent='Prénom et nom obligatoires'; errEl.style.display='block'; return; }
  if (tel.length<10) { errEl.textContent='Téléphone invalide (10 chiffres)'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  const {data,error} = await sb.from('membres').insert([{
    nom:prenom+' '+nom.toUpperCase(),telephone:tel,
    email:email||null,date_naissance:dob||null,
    rgpd_accepte_le:new Date().toISOString()
  }]).select().single();
  if (error) { errEl.textContent=(error.code==='23505'?'Ce numéro est déjà inscrit':'Erreur: '+error.message); errEl.style.display='block'; return; }

// ── SCANNER ──
document.getElementById('scanFab').onclick = openScanner;
document.getElementById('scanClose').onclick = closeScanner;

async function openScanner() {
  document.getElementById('scannerModal').style.display = 'flex';
  document.getElementById('scanHint').textContent = 'Pointez vers le QR code du client';
  scanActive = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    scanStream = stream;
    const video = document.getElementById('scanVideo');
    video.srcObject = stream;
    video.play().then(() => { scanRaf = requestAnimationFrame(scanTick); });
  } catch(e) {
    document.getElementById('scanHint').textContent = 'Caméra non disponible';
  }
}

function scanTick() {
  if (!scanActive) return;
  const video  = document.getElementById('scanVideo');
  const canvas = document.getElementById('scanCanvas');
  if (video.readyState >= 2 && video.videoWidth > 0 && window.jsQR) {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = window.jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
    if (code?.data?.startsWith('FIDELITAB_')) {
      const parts = code.data.split('_');
      const memberId = parts[1];
      const ruleId   = parts[2] ? parseInt(parts[2]) : null;
      stopScan();
      processScannedMember(memberId, ruleId);
      return;
    }
  }
  scanRaf = requestAnimationFrame(scanTick);
}

function stopScan() {
  scanActive = false;
  if (scanStream) scanStream.getTracks().forEach(t => t.stop());
  if (scanRaf) cancelAnimationFrame(scanRaf);
  scanStream = null; scanRaf = null;
}

function closeScanner() {
  stopScan();
  document.getElementById('scannerModal').style.display = 'none';
}

async function processScannedMember(memberId, preselectedRuleId) {
  closeScanner();
  const { data: m } = await sb.from('membres').select('*').eq('id', memberId).single();
  if (!m) { showToast('Client non trouvé'); return; }
  const { data: cards } = await sb.from('cartes_tampons').select('*').eq('membre_id', memberId);
  const cm = {};
  (cards||[]).forEach(c => { cm[c.regle_id] = c.compteur; });

  const sheet = document.getElementById('confirmSheet');
  const modal = document.getElementById('confirmModal');

  let rulesHtml = '';
  if (preselectedRuleId) {
    const r = rules.find(x => x.id === preselectedRuleId);
    if (r) {
      const count = cm[r.id]||0;
      const full = count >= r.objectif;
      const dots = Array.from({length:r.objectif},(_,i)=>`<div class="sdot ${i<count?'on':'off'}">${i<count?'✓':''}</div>`).join('');
      rulesHtml = `<div class="stamp-card ${full?'full':''}">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <span style="font-size:22px">${r.emoji}</span>
          <div><div style="font-size:15px;font-weight:600">${r.nom}</div><div style="font-size:12px;color:var(--text2)">${count}/${r.objectif}</div></div>
        </div>
        <div class="sdots">${dots}</div>
        ${full?`<div style="background:var(--purple-l);color:#3C3489;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;margin-top:8px">🎉 ${r.recompense}</div>`:`<button class="btn-green" style="width:100%;margin-top:8px" onclick="addStampFromScan('${memberId}',${r.id})">✚ Valider le tampon ${r.emoji} ${r.nom}</button>`}
      </div>`;
    }
  } else {
    rulesHtml = rules.map(r => {
      const count = cm[r.id]||0;
      const full = count >= r.objectif;
      return `<button style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:12px;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:8px" onclick="addStampFromScan('${memberId}',${r.id})">
        <span style="font-size:22px">${r.emoji}</span>
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${r.nom}</div><div style="font-size:12px;color:var(--text2)">${full?'🎉 Récompense !':count+'/'+r.objectif}</div></div>
      </button>`;
    }).join('');
  }

  sheet.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div class="avatar" style="${avS(m.nom)};width:48px;height:48px;font-size:18px;font-weight:700">${avI(m.nom)}</div>
      <div><div style="font-size:17px;font-weight:700">${m.nom}</div><div style="font-size:13px;color:var(--text2)">${(m.points||0).toLocaleString('fr-FR')} points · <span class="tier tier-${getTier(m.points||0)}">${tierLabel(getTier(m.points||0))}</span></div></div>
    </div>
    ${rulesHtml}
    <button class="btn-ghost" style="width:100%;margin-top:8px" onclick="document.getElementById('confirmModal').style.display='none'">Annuler</button>`;
  modal.style.display = 'flex';
}

async function addStampFromScan(memberId, ruleId) {
  document.getElementById('confirmModal').style.display = 'none';
  await addStampManual(memberId, ruleId);
  selMemberId = memberId;
  await renderMemberDetail(memberId);
}

// ── INIT ──

// ── SCAN FROM URL (native camera) ──
async function checkScanParams() {
  const params = new URLSearchParams(window.location.search);
  const memberId = params.get('scan');
  const ruleId   = params.get('rule');
  if (!memberId) return false;
  // Clean URL without reload
  window.history.replaceState({}, '', window.location.pathname);
  await loadData();
  if (ruleId) {
    await processScannedMember(memberId, parseInt(ruleId));
  } else {
    selMemberId = memberId;
    await renderMemberDetail(memberId);
  }
  return true;
}

checkScanParams().then(handled => { if(!handled) loadData().then(render); });
</script>
