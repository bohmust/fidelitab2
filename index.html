<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FidéliTab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0D0D14;
  --ink2:#5A5A72;
  --ink3:#9898B0;
  --gold:#C9922A;
  --gold-l:#FFF8EC;
  --gold-d:#8A6018;
  --jade:#1A7A5E;
  --jade-l:#E8F5F1;
  --rose:#C94040;
  --rose-l:#FDF0F0;
  --surface:#FAFAF8;
  --card:#FFFFFF;
  --border:#EBEBEB;
  --border2:#F0F0EE;
  --radius:20px;
  --shadow:0 2px 16px rgba(13,13,20,.08);
  --shadow-lg:0 8px 40px rgba(13,13,20,.14);
}
html,body{height:100%;background:var(--surface);font-family:'DM Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--surface);display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes stampPop{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(80px) rotate(360deg);opacity:0}}

.screen{display:flex;flex-direction:column;flex:1;animation:fadeUp .3s ease both}

/* ── HEADER ── */
.shop-header{
  background:var(--ink);
  padding:20px 22px 18px;
  display:flex;align-items:center;gap:12px;
  position:relative;overflow:hidden;
}
.shop-header::before{
  content:'';position:absolute;top:-30px;right:-20px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,146,42,.25) 0%,transparent 70%);
}
.shop-logo{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold) 0%,#E8B450 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--ink);
  flex-shrink:0;box-shadow:0 2px 10px rgba(201,146,42,.4);
}
.shop-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:.02em}
.shop-addr{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}

/* ── USER HEADER ── */
.user-header{
  background:var(--ink);
  padding:0 22px 24px;
}
.user-card{
  background:linear-gradient(135deg,#1A1A2E 0%,#252540 100%);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;padding:18px 20px;
  position:relative;overflow:hidden;
}
.user-card::before{
  content:'';position:absolute;top:-40px;right:-30px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,146,42,.15) 0%,transparent 65%);
}
.user-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.user-av{
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg,var(--gold) 0%,#E8B450 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--ink);
  flex-shrink:0;
}
.user-name{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:#fff;letter-spacing:-.01em}
.user-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
.points-row{display:flex;align-items:baseline;gap:6px}
.points-num{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:var(--gold);line-height:1}
.points-label{font-size:13px;color:rgba(255,255,255,.4)}
.level-badge{
  margin-left:auto;padding:4px 10px;border-radius:20px;
  background:rgba(201,146,42,.15);border:1px solid rgba(201,146,42,.3);
  font-size:11px;font-weight:600;color:var(--gold);
  white-space:nowrap;align-self:flex-end;
}
.reward-banner{
  background:linear-gradient(90deg,rgba(201,146,42,.2) 0%,rgba(201,146,42,.08) 100%);
  border:1px solid rgba(201,146,42,.25);
  border-radius:10px;padding:10px 12px;margin-top:12px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,.85);
  display:flex;align-items:center;gap:8px;
}

/* ── CONTENT / CARDS ── */
.cards-section{flex:1;padding:20px 18px;overflow-y:auto}
.section-title{
  font-family:'Fraunces',serif;font-size:13px;font-weight:600;
  color:var(--ink2);text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:14px;
}
.stamp-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  transition:transform .15s ease,box-shadow .15s ease;
  animation:fadeUp .35s ease both;
}
.stamp-card:active{transform:scale(.98)}
.stamp-card.full{
  background:linear-gradient(135deg,#FFFBF2 0%,#FFF5E0 100%);
  border-color:rgba(201,146,42,.3);
  box-shadow:0 4px 20px rgba(201,146,42,.12);
}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-left{display:flex;align-items:center;gap:10px}
.card-emoji{
  width:40px;height:40px;border-radius:12px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.stamp-card.full .card-emoji{background:rgba(201,146,42,.12)}
.card-name{font-family:'Fraunces',serif;font-size:15px;font-weight:600;letter-spacing:-.01em}
.card-sub{font-size:12px;color:var(--ink2);margin-top:1px}
.card-count{
  font-family:'Fraunces',serif;font-size:16px;font-weight:700;
  color:var(--ink2);
}
.stamp-card.full .card-count{color:var(--gold-d)}
.dots{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.dot{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  transition:all .2s ease;
}
.dot.off{
  background:var(--surface);
  border:1.5px dashed var(--border);
  color:transparent;
}
.dot.on{
  background:linear-gradient(135deg,var(--jade) 0%,#228C6E 100%);
  border:none;color:#fff;
  box-shadow:0 2px 6px rgba(26,122,94,.3);
}
.dot.on.new-dot{animation:stampPop .4s cubic-bezier(.34,1.56,.64,1) both}
.stamp-card.full .dot.on{
  background:linear-gradient(135deg,var(--gold) 0%,#E8B450 100%);
  box-shadow:0 2px 6px rgba(201,146,42,.35);
}
.progress-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--jade) 0%,#33C99A 100%);transition:width .5s ease}
.stamp-card.full .progress-fill{background:linear-gradient(90deg,var(--gold) 0%,#E8B450 100%)}
.full-tag{
  display:flex;align-items:center;gap:6px;
  background:rgba(201,146,42,.1);border-radius:8px;
  padding:7px 10px;margin-top:10px;
  font-size:12px;font-weight:600;color:var(--gold-d);
}

/* ── QR SECTION ── */
.qr-section{padding:0 18px 24px}
.qr-card{
  background:var(--ink);
  border-radius:22px;
  padding:22px;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(13,13,20,.2);
}
.qr-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(201,146,42,.12) 0%,transparent 55%),
             radial-gradient(ellipse at 20% 80%,rgba(26,122,94,.1) 0%,transparent 55%);
}
.qr-eyebrow{
  font-size:10px;font-weight:600;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:14px;position:relative;
}
.qr-wrap{
  display:flex;justify-content:center;margin-bottom:14px;position:relative;
}
.qr-inner{
  background:#fff;border-radius:14px;
  padding:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  display:inline-block;
}
.qr-name{
  font-family:'Fraunces',serif;font-size:16px;font-weight:600;
  color:#fff;margin-bottom:4px;position:relative;
}
.qr-hint{
  font-size:11px;color:rgba(255,255,255,.35);
  line-height:1.5;position:relative;
}

/* ── BOTTOM BAR ── */
.bottom-bar{padding:0 18px 28px;padding-bottom:max(28px,env(safe-area-inset-bottom))}
.btn-logout{
  width:100%;padding:14px;border-radius:14px;
  border:1px solid var(--border);background:transparent;
  font-family:'DM Sans',sans-serif;font-size:14px;
  font-weight:500;color:var(--ink2);cursor:pointer;
}

/* ── PHONE SCREEN ── */
.phone-screen{
  flex:1;display:flex;flex-direction:column;
}
.phone-hero{
  background:var(--ink);
  padding:40px 28px 36px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;position:relative;overflow:hidden;
}
.phone-hero::before{
  content:'';position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,146,42,.12) 0%,transparent 65%);
  top:-80px;left:50%;transform:translateX(-50%);
}
.hero-logo{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,var(--gold) 0%,#E8B450 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--ink);
  margin-bottom:20px;box-shadow:0 4px 20px rgba(201,146,42,.4);
  animation:float 3s ease-in-out infinite;
}
.hero-title{
  font-family:'Fraunces',serif;font-size:26px;font-weight:700;
  color:#fff;line-height:1.2;margin-bottom:8px;letter-spacing:-.02em;
}
.hero-title em{color:var(--gold);font-style:normal}
.hero-sub{font-size:14px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:0}
.phone-body{flex:1;padding:28px 22px}
.phone-label{
  font-size:12px;font-weight:600;color:var(--ink2);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;
}
.phone-input-wrap{position:relative;margin-bottom:16px}
.phone-input{
  width:100%;padding:18px 20px;
  border:2px solid var(--border);border-radius:16px;
  background:var(--card);
  font-family:'DM Sans',sans-serif;font-size:22px;font-weight:600;
  color:var(--ink);text-align:center;letter-spacing:4px;
  -webkit-appearance:none;
  transition:border-color .2s ease,box-shadow .2s ease;
}
.phone-input:focus{
  outline:none;border-color:var(--gold);
  box-shadow:0 0 0 4px rgba(201,146,42,.1);
}
.phone-input::placeholder{font-size:16px;letter-spacing:2px;color:var(--ink3)}
.err-chip{
  background:var(--rose-l);border:1px solid rgba(201,64,64,.15);
  border-radius:10px;padding:10px 14px;
  font-size:13px;color:var(--rose);font-weight:500;
  text-align:center;margin-bottom:14px;
}
.btn-primary{
  width:100%;padding:17px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--ink) 0%,#252545 100%);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;
  color:#fff;cursor:pointer;letter-spacing:.01em;
  box-shadow:0 4px 20px rgba(13,13,20,.2);
  transition:transform .15s ease,box-shadow .15s ease;
  position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,146,42,.2) 0%,transparent 50%);
}
.btn-primary:active{transform:scale(.98)}
.security-note{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--ink3);margin-top:16px;
  justify-content:center;
}

/* ── REGISTER SCREEN ── */
.reg-header{
  background:var(--ink);padding:24px 22px 20px;
}
.reg-back{
  font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;
  margin-bottom:12px;display:inline-block;
}
.reg-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-.01em}
.reg-subtitle{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px}
.reg-body{flex:1;padding:22px;overflow-y:auto}
.field{margin-bottom:16px}
.field-label{
  font-size:12px;font-weight:600;color:var(--ink2);
  text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;
}
.field-label span{font-size:11px;color:var(--ink3);text-transform:none;letter-spacing:0;font-weight:400}
.inp{
  width:100%;padding:14px 16px;
  border:1.5px solid var(--border);border-radius:12px;
  background:var(--card);font-family:'DM Sans',sans-serif;
  font-size:15px;color:var(--ink);-webkit-appearance:none;
  transition:border-color .2s ease,box-shadow .2s ease;
}
.inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,146,42,.1)}
.inp.err{border-color:var(--rose)}
.err-txt{font-size:12px;color:var(--rose);margin-top:5px}
.rgpd-wrap{
  background:var(--gold-l);border:1px solid rgba(201,146,42,.2);
  border-radius:14px;padding:16px;margin-bottom:20px;
}
.rgpd-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.rgpd-text{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px}
.rgpd-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.rgpd-check input{width:17px;height:17px;margin-top:1px;flex-shrink:0;accent-color:var(--gold)}
.rgpd-check label{font-size:13px;line-height:1.5;color:var(--ink);cursor:pointer}
.btn-register{
  width:100%;padding:17px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--jade) 0%,#228C6E 100%);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;
  color:#fff;cursor:pointer;margin-bottom:12px;
  box-shadow:0 4px 16px rgba(26,122,94,.3);
  transition:transform .15s ease;
}
.btn-register:active{transform:scale(.98)}
.btn-back{
  width:100%;padding:14px;border-radius:14px;
  border:1.5px solid var(--border);background:transparent;
  font-family:'DM Sans',sans-serif;font-size:14px;
  color:var(--ink2);cursor:pointer;
}

/* ── LOADING ── */
.loading{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
}
.spinner{
  width:32px;height:32px;
  border:2.5px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
.loading-text{font-size:14px;color:var(--ink2)}

/* ── WELCOME ── */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:36px 24px;text-align:center;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,146,42,.06) 0%,transparent 60%);
}
.welcome-icon{font-size:72px;margin-bottom:20px;animation:scaleIn .5s cubic-bezier(.34,1.56,.64,1)}
.welcome-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.welcome-sub{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:28px;max-width:280px}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:28px}
.product-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px;text-align:center;
}
.product-item .emoji{font-size:24px;margin-bottom:6px}
.product-item .pname{font-size:13px;font-weight:600}
.product-item .psub{font-size:11px;color:var(--ink2);margin-top:2px}
.btn-continue{
  width:100%;max-width:280px;padding:16px;border-radius:16px;border:none;
  background:var(--ink);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;color:#fff;cursor:pointer;
}

/* ── CONFIRM ── */
.confirm-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:36px 24px;text-align:center;
  position:relative;overflow:hidden;
}
.confirm-emoji{font-size:72px;margin-bottom:16px;animation:scaleIn .5s cubic-bezier(.34,1.56,.64,1) both}
.confirm-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.confirm-sub{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:20px}
.confirm-dots{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.reward-box{
  background:linear-gradient(135deg,var(--gold-l) 0%,#FFF0CC 100%);
  border:1px solid rgba(201,146,42,.25);
  border-radius:16px;padding:16px 20px;
  font-family:'Fraunces',serif;font-size:16px;font-weight:600;
  color:var(--gold-d);margin-bottom:24px;width:100%;
}
.btn-home{
  width:100%;max-width:280px;padding:16px;border-radius:16px;border:none;
  background:var(--ink);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:10px;
}

/* ── CONFETTI ── */
.confetti-wrap{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
.cdot{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall .9s ease forwards}

/* ── SELECT / CODE SCREENS ── */
.select-back{font-size:12px;color:var(--jade);font-weight:500;cursor:pointer;margin-bottom:14px;display:inline-block}
.prod-btn-item{width:100%;padding:15px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:14px;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .12s}
.prod-btn-item:active{transform:scale(.98)}
.code-card{background:var(--ink);border-radius:22px;padding:26px 22px 22px;text-align:center;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(13,13,20,.2)}
.code-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 10%,rgba(201,146,42,.1) 0%,transparent 55%)}
.cc-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;position:relative}
.cc-digits{display:flex;gap:10px;justify-content:center;margin-bottom:20px;position:relative}
.cc-d{width:56px;height:68px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:#fff}
.cc-hint{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5;margin-bottom:16px;position:relative}
.cc-timer{font-size:13px;font-weight:600;margin-bottom:8px;position:relative}
.cc-bar{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;position:relative}
.cc-bar-fill{height:100%;border-radius:2px;transition:width 1s linear}
.btn-purchase{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--jade) 0%,#228C6E 100%);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 16px rgba(26,122,94,.25);transition:transform .15s}
.btn-purchase:active{transform:scale(.98)}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const SUPABASE_URL='https://cgyvmrxpoofrnturffxl.supabase.co';

function el(tag,attrs,...ch){
  const n=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class')n.className=v;
    else if(k.startsWith('on'))n[k]=v;
    else if(k==='html')n.innerHTML=v;
    else n.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null&&c!==false)n.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return n;
}

function confettiEl(){
  const cols=['#C9922A','#1A7A5E','#C94040','#534AB7','#E8B450'];
  const w=el('div',{class:'confetti-wrap'});
  for(let i=0;i<20;i++){
    const d=el('div',{class:'cdot'});
    d.style.cssText=`background:${cols[i%5]};left:${5+Math.random()*90}%;top:${Math.random()*40}%;animation-delay:${Math.random()*.7}s;animation-duration:${.7+Math.random()*.5}s`;
    w.appendChild(d);
  }
  return w;
}

function getTier(pts){

        )

function renderConfirm(ruleId){
  const r=state.rules.find(x=>x.id===ruleId);
  const count=state.confirmedCount,full=state.isComplete;
  const app=$app();app.innerHTML='';
  const s=el('div',{class:'screen'});
  if(full)s.appendChild(confettiEl());
  const dots=el('div',{class:'confirm-dots'});
  for(let i=0;i<r.objectif;i++)dots.appendChild(el('div',{class:'dot '+(i<count?'on':'off')},i<count?'✓':''));
  s.appendChild(el('div',{class:'confirm-screen'},
    el('div',{class:'confirm-emoji'},full?'🎉':r.emoji),
    el('div',{class:'confirm-title'},full?'Récompense débloquée !':'Tampon ajouté !'),
    el('div',{class:'confirm-sub'},full?`Carte ${r.nom} complète !\nMontrez cet écran en caisse.`:'+1 tampon enregistré sur votre carte '+r.nom+'.'),
    full?el('div',{class:'reward-box'},r.recompense):dots,
    el('button',{class:'btn-home',onclick:renderHome},'Voir mes cartes →'),
    el('button',{class:'btn-logout',style:'margin-top:4px',onclick:doLogout},'Se déconnecter')
  ));
  app.appendChild(s);
}

// ── POLL ──
function startPolling(ruleId){
  if(pollTimer)clearInterval(pollTimer);
  const last=state.cards[ruleId]||0;
  pollTimer=setInterval(async()=>{
    try{
      const fresh=await getCards(state.member.id);
      if((fresh[ruleId]||0)>last){
        clearInterval(pollTimer);
        state.cards=fresh;
        state.confirmedCount=fresh[ruleId];
        state.isComplete=fresh[ruleId]>=(state.rules.find(r=>r.id===ruleId)?.objectif||99);
        const{data}=await sb.from('membres').select('points').eq('id',state.member.id).single();
        if(data)state.member.points=data.points;
        renderConfirm(ruleId);
      }
    }catch(e){}
  },2000);
}

// ── ACTIONS ──
async function doCheckPhone(){
  const c=clean(state.phone);
  if(c.length<10){state.errors={phone:'Entrez un numéro à 10 chiffres'};renderPhone();return;}
  renderLoading();
  try{
    const member=await findMember(c);
    state.rules=await getRules();
    if(member){
      state.member=member;
      state.cards=await getCards(member.id);
      state.errors={};
      renderHome();
    }else{
      state.errors={};
      renderRegister();
    }
  }catch(e){state.errors={phone:'Erreur réseau — réessayez'};renderPhone();}
}

async function doRegister(){
  const{form}=state;const errs={};
  if(!form.prenom.trim())errs.prenom='Prénom requis';
  if(!form.nom.trim())errs.nom='Nom requis';
  if(form.dob){const age=(Date.now()-new Date(form.dob))/(365.25*24*3600*1000);if(age<16||age>120)errs.dob='Date invalide';}
  if(form.email&&!/^[^@]+@[^@]+\.[^@]+$/.test(form.email))errs.email='Email invalide';
  if(!form.rgpd)errs.rgpd='Vous devez accepter pour continuer';
  if(Object.keys(errs).length){state.errors=errs;renderRegister();return;}
  renderLoading();
  try{
    const m=await createMember({nom:form.prenom.trim()+' '+form.nom.trim().toUpperCase(),telephone:clean(state.phone),email:form.email||null,date_naissance:form.dob||null,rgpd_accepte_le:new Date().toISOString()});
    state.member=m;state.cards={};
    state.rules=state.rules.length?state.rules:await getRules();
    renderWelcome();
  }catch(e){
    console.error('doRegister error',JSON.stringify(e));
    const msg=e?.message||e?.error_description||e?.details||JSON.stringify(e)||'';
    const code=e?.code||'';
    const isDouble=msg.includes('duplicate')||msg.includes('unique')||code==='23505';
    const isMissing=msg.includes('inscrire_membre')||code==='42883'||code==='PGRST202';
    state.errors={prenom:isDouble
      ?'Ce numéro est déjà inscrit — entrez votre numéro pour accéder à votre carte'
      :isMissing
        ?'Erreur config : exécutez patch_inscription_rpc.sql dans Supabase'
        :'Erreur ('+code+'): '+msg};
    renderRegister();
  }
}

function doLogout(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  if(codeTimer){clearInterval(codeTimer);codeTimer=null;}
  state={phone:'',member:null,rules:[],cards:{},errors:{},form:{prenom:'',nom:'',dob:'',email:'',rgpd:false},confirmedCount:0,isComplete:false,selRuleId:null,codeId:null,codeVal:null,codeExpiresAt:null};
  renderPhone();
}

// ── CODE SCREEN ──

  s.appendChild(el('div',{class:'shop-header'},

  ));

  ));
  section.appendChild(card);

// ── SELECT PRODUCT ACTION ──
async function doSelectProd(ruleId){
  state.selRuleId=ruleId;
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  if(codeTimer){clearInterval(codeTimer);codeTimer=null;}
  renderLoading();
  try{
    const code=(Math.floor(Math.random()*9000)+1000).toString();
    const expireAt=new Date(Date.now()+CODE_EXPIRE_SECONDS*1000);
    const{data,error}=await sb.from('codes_validation').insert([{
      code,membre_id:state.member.id,regle_id:ruleId,
      expire_le:expireAt.toISOString(),utilise:false
    }]).select().single();
    if(error)throw error;
    state.codeId=data.id;state.codeVal=code;state.codeExpiresAt=expireAt.getTime();
    renderCode();
    startPolling(ruleId);
    codeTimer=setInterval(()=>{
      const left=Math.max(0,Math.ceil((state.codeExpiresAt-Date.now())/1000));
      const fill=document.getElementById('ccFill'),timer=document.getElementById('ccTimer');
      if(fill){fill.style.width=(left/CODE_EXPIRE_SECONDS*100)+'%';fill.style.background=left<30?'#f59e0b':'var(--gold)';}
      if(timer){timer.textContent=left>0?left+'s':'Expiré';timer.style.color=left<=0?'var(--rose)':left<30?'#f59e0b':'rgba(255,255,255,.5)';}
      if(left<=0){clearInterval(codeTimer);codeTimer=null;renderCode();}
    },1000);
  }catch(e){renderSelect();}
}

renderPhone();
</script>
