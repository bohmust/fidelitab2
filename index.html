<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FidéliTab — Ma Carte</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#3C3489;--green:#1D9E75;--green-l:#E1F5EE;--red:#D85A30;--text:#111;--text2:#6b7280;--border:#e5e7eb;--bg:#f9fafb}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.screen{display:flex;flex-direction:column;flex:1;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.header{background:var(--purple);padding:18px 20px 16px;display:flex;align-items:center;gap:10px}
.h-name{font-size:13px;font-weight:600;color:#fff}
.h-addr{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.user-hd{background:var(--purple);padding:18px 20px 16px}
.uav{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;flex-shrink:0}
.uname{font-size:16px;font-weight:600;color:#fff}
.upts{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px}
.rbanner{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:13px;color:#fff;font-weight:500}
.content{flex:1;padding:24px 20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.title{font-size:21px;font-weight:700}
.sub{font-size:14px;color:var(--text2);line-height:1.6;margin-top:4px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:600;display:flex;justify-content:space-between}
.field label span{font-size:11px;color:var(--text2);font-weight:400}
.inp{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none}
.inp:focus{outline:none;border-color:var(--purple)}
.inp-phone{text-align:center;letter-spacing:3px;font-size:22px;font-weight:600}
.err-msg{font-size:13px;color:var(--red)}
.badge{display:inline-block;background:var(--green-l);color:#065f46;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.rgpd-box{background:#f8f9ff;border:1px solid #e0deff;border-radius:12px;padding:14px}
.rgpd-title{font-size:13px;font-weight:600;margin-bottom:6px}
.rgpd-text{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.rgpd-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.rgpd-check input{margin-top:2px;width:17px;height:17px;flex-shrink:0;accent-color:var(--purple)}
.rgpd-check span{font-size:13px;line-height:1.5}
.btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-purple{background:var(--purple);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);font-size:13px}
.cards-wrap{flex:1;padding:14px 20px;overflow-y:auto}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.stamp-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.stamp-card.full{background:#EEEDFE;border-color:#c4c0f0}
.dots-row{display:flex;gap:4px;flex-wrap:wrap}
.dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.dot.on{background:var(--green-l);border:2px solid var(--green);color:var(--green)}
.dot.off{background:#f3f4f6;border:1.5px dashed #d1d5db}
.pbar{height:3px;background:#f3f4f6;border-radius:2px;overflow:hidden;margin-top:8px}
.pbar-fill{height:100%;background:var(--green);border-radius:2px}
.bottom-bar{padding:0 20px 24px;display:flex;flex-direction:column;gap:10px}
.qr-box{background:#1e1b4b;border-radius:14px;padding:16px;text-align:center}
.qr-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.qr-hint{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5;margin-top:8px}
.confirm{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;text-align:center;position:relative}
.c-emoji{font-size:64px;margin-bottom:16px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.3);opacity:0}60%{transform:scale(1.15)}to{transform:scale(1);opacity:1}}
.c-title{font-size:22px;font-weight:700;margin-bottom:8px}
.c-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px}
.reward-box{background:#EEEDFE;border-radius:14px;padding:14px 20px;margin-bottom:24px;font-size:15px;font-weight:600;color:#3C3489;width:100%}
.loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--text2);font-size:14px}
.spinner{width:30px;height:30px;border:3px solid #e5e7eb;border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{background:var(--bg);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.6;display:flex;gap:8px}
.footer-txt{padding:14px 20px;text-align:center;font-size:12px;color:var(--text2);border-top:1px solid var(--border)}
.confetti-wrap{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
.cdot{position:absolute;width:8px;height:8px;border-radius:50%;animation:cfall .9s ease forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100px) rotate(400deg);opacity:0}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const SUPABASE_URL='https://cgyvmrxpoofrnturffxl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNneXZtcnhwb29mcm50dXJmZnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjkxNjQsImV4cCI6MjA4Nzk0NTE2NH0.0JNkokFJOshJnzyrBOSbgrnyFHeLvA5pMaaL1jP8kq8';
const SHOP={name:'Tabac Presse Grandclément',addr:'Place Grandclément, Villeurbanne'};
const ADMIN_URL='https://bohmust.github.io/fidelitab2/admin.html';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const PRODUCT_FROM_QR=new URLSearchParams(window.location.search).get('p');

let state={screen:'phone',phone:'',member:null,rules:[],cards:{},errors:{},form:{prenom:'',nom:'',dob:'',email:'',rgpd:false},confirmedCount:0,isComplete:false};

const fmt=v=>v.replace(/\D/g,'').slice(0,10).replace(/(\d{2})(?=\d)/g,'$1 ').trim();
const clean=v=>v.replace(/\s/g,'');
const $app=()=>document.getElementById('app');

function el(tag,attrs,...ch){
  const n=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='class')n.className=v;else if(k.startsWith('on'))n[k]=v;else n[k]=v;});
  ch.flat().forEach(c=>{if(c!=null&&c!==false)n.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return n;
}

function header(){
  return el('div',{class:'header'},el('span',{style:'font-size:20px'},'🏷️'),el('div',null,el('div',{class:'h-name'},SHOP.name),el('div',{class:'h-addr'},SHOP.addr)));
}

function confetti(){
  const cols=['#1D9E75','#534AB7','#F5A623','#D85A30','#185FA5'];
  const w=el('div',{class:'confetti-wrap'});
  for(let i=0;i<18;i++){const d=el('div',{class:'cdot'});d.style.cssText=`background:${cols[i%5]};left:${10+Math.random()*80}%;top:${5+Math.random()*50}%;animation-delay:${Math.random()*.6}s`;w.appendChild(d);}
  return w;
}

async function findMember(phone){const{data}=await sb.from('membres').select('*').eq('telephone',phone).single();return data;}
async function createMember(d){const{data,error}=await sb.from('membres').insert([d]).select().single();if(error)throw error;return data;}
async function getRules(){const{data}=await sb.from('regles_tampons').select('*').eq('actif',true).order('ordre');return data||[];}
async function getCards(mId){const{data}=await sb.from('cartes_tampons').select('regle_id,compteur').eq('membre_id',mId);const m={};(data||[]).forEach(c=>m[c.regle_id]=c.compteur);return m;}

function makeQR(containerId,text,size){
  const container=document.getElementById(containerId);
  if(!container||!window.QRCode)return;
  container.innerHTML='';
  try{new QRCode(container,{text,width:size,height:size,colorDark:'#1a1a1a',colorLight:'#ffffff'});}catch(e){}
}

// PHONE SCREEN
function renderPhone(){
  const app=$app();app.innerHTML='';
  const inp=el('input',{class:'inp inp-phone',type:'tel',placeholder:'06 XX XX XX XX',value:fmt(state.phone),
    oninput:e=>{state.phone=clean(e.target.value);e.target.value=fmt(state.phone);},
    onkeydown:e=>{if(e.key==='Enter')doCheckPhone();}});
  const s=el('div',{class:'screen'});
  s.appendChild(header());
  s.appendChild(el('div',{class:'content'},
    el('div',null,el('div',{class:'title'},'Bienvenue !'),el('div',{class:'sub'},PRODUCT_FROM_QR?`QR ${PRODUCT_FROM_QR} scanné. Entrez votre numéro.`:'Entrez votre numéro pour accéder à votre carte ou vous inscrire gratuitement.')),
    inp,
    state.errors.phone?el('div',{class:'err-msg',style:'text-align:center'},state.errors.phone):null,
    el('button',{class:'btn btn-purple',onclick:doCheckPhone},'Continuer →'),
    el('div',{class:'info-box',style:'margin-top:auto'},el('span',null,'🔒'),el('span',null,'Vos données sont protégées.'))
  ));
  app.appendChild(s);
  setTimeout(()=>inp.focus(),50);
}

// REGISTER SCREEN
function renderRegister(){
  const{form,errors}=state;
  const app=$app();app.innerHTML='';
  const s=el('div',{class:'screen'});
  s.appendChild(header());
  const mkF=(type,ph,key,lbl,hint)=>el('div',{class:'field'},
    el('label',null,lbl,errors[key]?null:(hint?el('span',null,hint):null)),
    el('input',{class:'inp'+(errors[key]?' err-field':''),type,placeholder:ph,value:form[key]||'',...(type==='date'?{max:new Date().toISOString().split('T')[0]}:{}),oninput:e=>{state.form[key]=e.target.value;}}),
    errors[key]?el('div',{class:'err-msg'},errors[key]):null
  );
  const cb=el('input',{type:'checkbox',onchange:e=>{state.form.rgpd=e.target.checked;}});
  cb.checked=form.rgpd;
  s.appendChild(el('div',{class:'content'},
    el('div',null,el('span',{class:'badge'},'Première visite'),el('div',{class:'title',style:'margin-top:8px'},'Créez votre compte'),el('div',{class:'sub'},'Numéro : ',el('strong',null,fmt(state.phone)))),
    mkF('text','Votre prénom','prenom','Prénom',null),
    mkF('text','Votre nom de famille','nom','Nom',null),
    mkF('date','','dob','Date de naissance','Optionnel — bonus anniversaire'),
    mkF('email','votre@email.fr','email','Email','Optionnel — récap de points'),
    el('div',{class:'rgpd-box'},
      el('div',{class:'rgpd-title'},'Protection de vos données (RGPD)'),
      el('div',{class:'rgpd-text'},`${SHOP.name} collecte vos données uniquement pour votre programme de fidélité. Aucune transmission à des tiers. Suppression possible en caisse.`),
      el('label',{class:'rgpd-check'},cb,el('span',{style:errors.rgpd?'color:var(--red)':''},`J'accepte que mes données soient utilisées pour le programme de fidélité de ${SHOP.name} *`)),
      errors.rgpd?el('div',{class:'err-msg',style:'margin-top:6px'},errors.rgpd):null
    ),
    el('button',{class:'btn btn-green',onclick:doRegister},"M'inscrire gratuitement →"),
    el('button',{class:'btn btn-ghost',onclick:()=>{state.screen='phone';state.errors={};renderPhone();}},'← Modifier le numéro')
  ));
  app.appendChild(s);
}

// LOADING
function renderLoading(){
  const app=$app();app.innerHTML='';
  const s=el('div',{class:'screen'});
  s.appendChild(header());
  s.appendChild(el('div',{class:'loading'},el('div',{class:'spinner'}),el('div',null,'Chargement...')));
  app.appendChild(s);
}

// WELCOME
function renderWelcome(){
  const app=$app();app.innerHTML='';
  const s=el('div',{class:'screen',style:'position:relative'});
  s.appendChild(confetti());
  const grid=el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:24px'});
  state.rules.forEach(r=>grid.appendChild(el('div',{style:'background:#f9fafb;border-radius:12px;padding:12px;text-align:center'},el('div',{style:'font-size:22px;margin-bottom:4px'},r.emoji),el('div',{style:'font-size:13px;font-weight:600'},r.nom),el('div',{style:'font-size:11px;color:var(--text2);margin-top:2px'},r.objectif+' achats → offert'))));
  s.appendChild(el('div',{class:'confirm'},
    el('div',{class:'c-emoji'},'🎉'),
    el('div',{class:'c-title'},'Bienvenue '+(state.member.nom.split(' ')[0])+' !'),
    el('div',{class:'c-sub'},'Votre carte de fidélité est créée.\nMontrez votre QR code au caissier à chaque achat.'),
    grid,
    el('button',{class:'btn btn-purple',onclick:renderHome},'Voir mes cartes →')
  ));
  app.appendChild(s);
}

// HOME — QR affiché directement
function renderHome(){
  const ready=state.rules.filter(r=>(state.cards[r.id]||0)>=r.objectif);
  const app=$app();app.innerHTML='';
  const s=el('div',{class:'screen'});
  const uH=el('div',{class:'user-hd'},
    el('div',{style:'display:flex;align-items:center;gap:12px'},
      el('div',{class:'uav'},state.member.nom[0]),
      el('div',null,el('div',{class:'uname'},'Bonjour '+(state.member.nom.split(' ')[0])+' !'),el('div',{class:'upts'},(state.member.points||0).toLocaleString('fr-FR')+' points'))
    ),
    ready.length?el('div',{class:'rbanner'},'🎉 '+(ready.length)+' récompense(s) disponible(s) — demandez en caisse !'):null
  );
  s.appendChild(uH);
  const wrap=el('div',{class:'cards-wrap'});
  wrap.appendChild(el('div',{class:'sec-lbl'},'Mes cartes tampons'));
  state.rules.forEach(r=>{
    const count=state.cards[r.id]||0,full=count>=r.objectif,pct=Math.round(count/r.objectif*100);
    const card=el('div',{class:'stamp-card'+(full?' full':'')});
    const dots=el('div',{class:'dots-row'});
    for(let i=0;i<r.objectif;i++)dots.appendChild(el('div',{class:'dot '+(i<count?'on':'off')},i<count?'✓':''));
    card.appendChild(el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px'},
      el('div',{style:'display:flex;gap:8px;align-items:center'},
        el('span',{style:'font-size:20px'},r.emoji),
        el('div',null,el('div',{style:'font-size:14px;font-weight:600;color:'+(full?'#3C3489':'var(--text)')},r.nom),el('div',{style:'font-size:12px;color:'+(full?'#534AB7':'var(--text2)')},full?'✓ Récompense disponible !':r.recompense))
      ),
      el('span',{style:'font-size:13px;font-weight:600;color:'+(full?'#3C3489':'var(--text2)')},count+'/'+r.objectif)
    ));
    card.appendChild(dots);
    if(!full){const pb=el('div',{class:'pbar'});const pf=el('div',{class:'pbar-fill'});pf.style.width=pct+'%';pb.appendChild(pf);card.appendChild(pb);}
    wrap.appendChild(card);
  });
  s.appendChild(wrap);

  // QR code direct en bas
  const qrBox=el('div',{class:'qr-box'});
  qrBox.appendChild(el('div',{class:'qr-label'},'Mon QR code — montrez-le au caissier'));
  qrBox.appendChild(el('div',{id:'homeQRDiv',style:'display:flex;justify-content:center;margin-bottom:8px'}));
  qrBox.appendChild(el('div',{class:'qr-hint'},'Le caissier scanne ce QR avec son téléphone → tampon ajouté automatiquement'));

  s.appendChild(el('div',{class:'bottom-bar'},
    qrBox,
    el('button',{class:'btn btn-ghost',onclick:doLogout},'← Se déconnecter')
  ));
  app.appendChild(s);

  // Générer le QR après le rendu
  setTimeout(()=>{
    const pp=PRODUCT_FROM_QR;
    const rule=pp?state.rules.find(r=>r.nom.toLowerCase().includes(pp)||r.nom.toLowerCase().includes(pp.replace('ecig','cig'))):state.rules[0];
    const rid=rule?rule.id:(state.rules[0]?.id||1);
    const url=ADMIN_URL+'?scan='+state.member.id+'&rule='+rid;
    const wrap=document.getElementById('homeQRDiv');
    if(wrap&&window.QRCode){wrap.innerHTML='';new QRCode(wrap,{text:url,width:150,height:150,colorDark:'#1a1a1a',colorLight:'#ffffff'});}
  },200);
}

// CONFIRM
function renderConfirm(ruleId){
  const r=state.rules.find(x=>x.id===ruleId);
  const count=state.confirmedCount,full=state.isComplete;
  const app=$app();app.innerHTML='';
  const s=el('div',{class:'screen',style:'position:relative'});
  if(full)s.appendChild(confetti());
  const dots=el('div',{class:'dots-row',style:'justify-content:center;margin-bottom:20px'});
  for(let i=0;i<r.objectif;i++)dots.appendChild(el('div',{class:'dot '+(i<count?'on':'off')},i<count?'✓':''));
  s.appendChild(el('div',{class:'confirm'},
    el('div',{class:'c-emoji'},full?'🎉':r.emoji),
    el('div',{class:'c-title',style:full?'color:#3C3489':''},full?'Récompense débloquée !':'Tampon ajouté !'),
    el('div',{class:'c-sub'},full?`Carte ${r.nom} complète !\nMontrez cet écran en caisse.`:'+1 tampon enregistré sur votre carte '+r.nom+'.'),
    full?el('div',{class:'reward-box'},r.recompense):dots,
    el('button',{class:'btn '+(full?'btn-purple':'btn-green'),style:'max-width:280px',onclick:renderHome},'Voir mes cartes →'),
    el('button',{class:'btn btn-ghost',style:'margin-top:6px',onclick:doLogout},'Se déconnecter')
  ));
  s.appendChild(el('div',{class:'footer-txt'},SHOP.name+' · Merci de votre visite 😊'));
  app.appendChild(s);
}

// POLL FOR STAMP
let pollTimer=null;
function startPolling(ruleId){
  if(pollTimer)clearInterval(pollTimer);
  const lastCount=state.cards[ruleId]||0;
  pollTimer=setInterval(async()=>{
    try{
      const fresh=await getCards(state.member.id);
      const newCount=fresh[ruleId]||0;
      if(newCount>lastCount){
        clearInterval(pollTimer);
        state.cards=fresh;
        state.confirmedCount=newCount;
        state.isComplete=newCount>=(state.rules.find(r=>r.id===ruleId)?.objectif||99);
        const{data}=await sb.from('membres').select('points').eq('id',state.member.id).single();
        if(data)state.member.points=data.points;
        renderConfirm(ruleId);
      }
    }catch(e){}
  },2000);
}

// ACTIONS
async function doCheckPhone(){
  const c=clean(state.phone);
  if(c.length<10){state.errors={phone:'Entrez un numéro à 10 chiffres'};renderPhone();return;}
  renderLoading();
  try{
    const member=await findMember(c);
    state.rules=await getRules();
    if(member){
      state.member=member;
      state.cards=await getCards(member.id);
      state.errors={};
      if(PRODUCT_FROM_QR){
        const rule=state.rules.find(r=>r.nom.toLowerCase().includes(PRODUCT_FROM_QR)||r.nom.toLowerCase().includes(PRODUCT_FROM_QR.replace('ecig','cig')));
        if(rule){startPolling(rule.id);}
      }
      renderHome();
    }else{
      state.errors={};
      renderRegister();
    }
  }catch(e){state.errors={phone:'Erreur réseau — réessayez'};renderPhone();}
}

async function doRegister(){
  const{form}=state;const errs={};
  if(!form.prenom.trim())errs.prenom='Prénom requis';
  if(!form.nom.trim())errs.nom='Nom requis';
  if(form.dob){const age=(Date.now()-new Date(form.dob))/(365.25*24*3600*1000);if(age<16||age>120)errs.dob='Date invalide';}
  if(form.email&&!/^[^@]+@[^@]+\.[^@]+$/.test(form.email))errs.email='Email invalide';
  if(!form.rgpd)errs.rgpd='Vous devez accepter pour continuer';
  if(Object.keys(errs).length){state.errors=errs;renderRegister();return;}
  renderLoading();
  try{
    const m=await createMember({nom:form.prenom.trim()+' '+form.nom.trim().toUpperCase(),telephone:clean(state.phone),email:form.email||null,date_naissance:form.dob||null,rgpd_accepte_le:new Date().toISOString()});
    state.member=m;state.cards={};
    state.rules=await getRules();
    renderWelcome();
  }catch(e){state.errors={prenom:"Erreur d'inscription — réessayez"};renderRegister();}
}

function doLogout(){
  if(pollTimer)clearInterval(pollTimer);
  state={screen:'phone',phone:'',member:null,rules:[],cards:{},errors:{},form:{prenom:'',nom:'',dob:'',email:'',rgpd:false},confirmedCount:0,isComplete:false};
  renderPhone();
}

renderPhone();
</script>
</body>
</html>
